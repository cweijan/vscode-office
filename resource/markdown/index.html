<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <title>Markdown Editor</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="dist/index.css" />
    <link rel="stylesheet" href="index.css" />
    <base href="{{baseUrl}}/">
</head>

<body>
    <div id="vditor"></div>

    <!-- Context Menu -->
    <div class="vditor-context-menu" id="context-menu" role="menu" hidden>
        <div class="vditor-context-menu__group vditor-context-menu__ai-group" role="group">
            <button class="vditor-context-menu__item" type="button" data-action="aiPolish" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-sparkle"></span>
                </span>
                <span class="vditor-context-menu__label">AI Polish</span>
            </button>
        </div>
        <div class="vditor-context-menu__separator vditor-context-menu__ai-group" role="separator"></div>
        <div class="vditor-context-menu__group" role="group">
            <button class="vditor-context-menu__item" type="button" data-action="copy" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-copy"></span>
                </span>
                <span class="vditor-context-menu__label">Copy</span>
            </button>
            <button class="vditor-context-menu__item" type="button" data-action="copyAsHtml" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-code"></span>
                </span>
                <span class="vditor-context-menu__label">Copy as HTML</span>
            </button>
            <button class="vditor-context-menu__item" type="button" data-action="copyAsPlainText" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-symbol-string"></span>
                </span>
                <span class="vditor-context-menu__label">Copy as Plain Text</span>
            </button>
            <button class="vditor-context-menu__item" type="button" data-action="paste" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-clippy"></span>
                </span>
                <span class="vditor-context-menu__label">Paste</span>
            </button>
            <button class="vditor-context-menu__item" type="button" data-action="insertImage" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-file-media"></span>
                </span>
                <span class="vditor-context-menu__label">Insert Image</span>
            </button>
        </div>
        <div class="vditor-context-menu__separator" role="separator"></div>
        <div class="vditor-context-menu__group" role="group">
            <button class="vditor-context-menu__item vditor-context-menu__item--desktop-only" type="button"
                data-action="exportPdf" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-file-pdf"></span>
                </span>
                <span class="vditor-context-menu__label">Export PDF</span>
            </button>
            <button class="vditor-context-menu__item vditor-context-menu__item--desktop-only" type="button"
                data-action="exportPdfWithoutOutline" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-file-pdf"></span>
                </span>
                <span class="vditor-context-menu__label">Export PDF (Without Outline)</span>
            </button>
            <button class="vditor-context-menu__item vditor-context-menu__item--desktop-only" type="button"
                data-action="exportDocx" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-file-text"></span>
                </span>
                <span class="vditor-context-menu__label">Export Docx</span>
            </button>
            <button class="vditor-context-menu__item vditor-context-menu__item--desktop-only" type="button"
                data-action="exportHtml" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-code"></span>
                </span>
                <span class="vditor-context-menu__label">Export HTML</span>
            </button>
        </div>
        <div class="vditor-context-menu__separator" role="separator"></div>
        <div class="vditor-context-menu__group" role="group">
            <button class="vditor-context-menu__item vditor-context-menu__item--desktop-only" type="button"
                data-action="showInFolder" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-folder-opened"></span>
                </span>
                <span class="vditor-context-menu__label">Show in Folder</span>
            </button>
        </div>
    </div>

</body>
<script src="dist/index.min.js"></script>
<script src="../lib/vscode.js"></script>
<script src="index.js" type="module"></script>

</html>
