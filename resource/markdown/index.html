<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <title>Markdown Editor</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="dist/index.css" />
    <link rel="stylesheet" href="index.css" />
    <base href="{{baseUrl}}/">
</head>

<body>
    <div id="vditor"></div>

    <!-- Context Menu -->
    <div class="vditor-context-menu" id="context-menu" role="menu" hidden>
        <div class="vditor-context-menu__group" role="group">
            <button class="vditor-context-menu__item" type="button" data-action="aiPolish" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-sparkle"></span>
                </span>
                <span class="vditor-context-menu__label">AI Polish</span>
            </button>
        </div>
        <div class="vditor-context-menu__separator" role="separator"></div>
        <div class="vditor-context-menu__group" role="group">
            <button class="vditor-context-menu__item" type="button" data-action="copy" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-copy"></span>
                </span>
                <span class="vditor-context-menu__label">Copy</span>
            </button>
            <div class="vditor-context-menu__submenu">
                <button class="vditor-context-menu__item vditor-context-menu__item--has-submenu" type="button"
                    role="menuitem" aria-haspopup="true" aria-expanded="false">
                    <span class="vditor-context-menu__icon" aria-hidden="true">
                        <span class="codicon codicon-copy"></span>
                    </span>
                    <span class="vditor-context-menu__label">Copy as</span>
                    <span class="vditor-context-menu__chevron codicon codicon-chevron-right" aria-hidden="true"></span>
                </button>
                <div class="vditor-context-menu__submenu-panel" role="menu">
                    <button class="vditor-context-menu__item" type="button" data-action="copyAsHtml" role="menuitem">
                        <span class="vditor-context-menu__icon" aria-hidden="true">
                            <span class="codicon codicon-code"></span>
                        </span>
                        <span class="vditor-context-menu__label">HTML</span>
                    </button>
                    <button class="vditor-context-menu__item" type="button" data-action="copyAsPlainText"
                        role="menuitem">
                        <span class="vditor-context-menu__icon" aria-hidden="true">
                            <span class="codicon codicon-symbol-string"></span>
                        </span>
                        <span class="vditor-context-menu__label">Plain Text</span>
                    </button>
                </div>
            </div>
            <button class="vditor-context-menu__item" type="button" data-action="paste" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-clippy"></span>
                </span>
                <span class="vditor-context-menu__label">Paste</span>
            </button>
        </div>
        <div class="vditor-context-menu__separator" role="separator"></div>
        <div class="vditor-context-menu__group" role="group">
            <button class="vditor-context-menu__item vditor-context-menu__item--desktop-only" type="button"
                data-action="exportPdf" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-file-pdf"></span>
                </span>
                <span class="vditor-context-menu__label">Export PDF</span>
            </button>
            <button class="vditor-context-menu__item vditor-context-menu__item--desktop-only" type="button"
                data-action="exportDocx" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-file-text"></span>
                </span>
                <span class="vditor-context-menu__label">Export Docx</span>
            </button>
            <button class="vditor-context-menu__item" type="button" data-action="exportHtml" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-code"></span>
                </span>
                <span class="vditor-context-menu__label">Export HTML</span>
            </button>
        </div>
        <div class="vditor-context-menu__separator" role="separator"></div>
        <div class="vditor-context-menu__group" role="group">
            <button class="vditor-context-menu__item" type="button" data-action="insertImage" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-file-media"></span>
                </span>
                <span class="vditor-context-menu__label">Insert Image</span>
            </button>
            <button class="vditor-context-menu__item vditor-context-menu__item--desktop-only" type="button"
                data-action="showInFolder" role="menuitem">
                <span class="vditor-context-menu__icon" aria-hidden="true">
                    <span class="codicon codicon-folder-opened"></span>
                </span>
                <span class="vditor-context-menu__label">Show in Folder</span>
            </button>
        </div>
    </div>

    <!-- Export Dialog -->
    <div class="vditor-pdf-export-overlay" id="export-dialog" role="presentation" hidden>
        <div class="vditor-pdf-export-dialog" role="dialog" aria-modal="true" aria-labelledby="export-dialog-title">
            <div class="vditor-pdf-export-dialog__header">
                <span class="codicon codicon-arrow-down vditor-pdf-export-dialog__icon" aria-hidden="true"></span>
                <h2 class="vditor-pdf-export-dialog__title" id="export-dialog-title">Export</h2>
            </div>
            <div class="vditor-pdf-export-dialog__body">
                <div class="vditor-pdf-export-row vditor-pdf-export-row--format">
                    <span class="vditor-pdf-export-row__label">Format</span>
                    <div class="vditor-export-format-group" role="radiogroup" aria-label="Export format">
                        <label class="vditor-export-format-option">
                            <input type="radio" name="export-format" value="pdf" data-export-option="type" checked>
                            <span class="vditor-export-format-option__label">PDF</span>
                        </label>
                        <label class="vditor-export-format-option">
                            <input type="radio" name="export-format" value="docx" data-export-option="type">
                            <span class="vditor-export-format-option__label">DOCX</span>
                        </label>
                        <label class="vditor-export-format-option">
                            <input type="radio" name="export-format" value="html" data-export-option="type">
                            <span class="vditor-export-format-option__label">HTML</span>
                        </label>
                    </div>
                </div>
                <div class="vditor-pdf-export-dialog__section" data-export-section="pdf">
                    <div class="vditor-pdf-export-row">
                        <div class="vditor-pdf-export-row__text">
                            <span class="vditor-pdf-export-row__label">Table of Contents</span>
                            <span class="vditor-pdf-export-row__hint">Include outline and PDF bookmarks</span>
                        </div>
                        <label class="vditor-pdf-export-toggle" aria-checked="true">
                            <input type="checkbox" data-export-option="outline" checked>
                            <span class="vditor-pdf-export-toggle__track" aria-hidden="true">
                                <span class="vditor-pdf-export-toggle__thumb"></span>
                            </span>
                        </label>
                    </div>
                </div>
                <div class="vditor-pdf-export-dialog__section vditor-export-pro-section" data-export-section="pro">
                    <div class="vditor-export-pro-header">
                        <span class="vditor-export-pro-header__title">Pro Features</span>
                    </div>
                    <div class="vditor-export-pro-body" data-export-pro-body>
                        <div class="vditor-pdf-export-row">
                            <div class="vditor-pdf-export-row__text">
                                <span class="vditor-pdf-export-row__label">Theme</span>
                                <span class="vditor-pdf-export-row__hint">Apply editor theme colors</span>
                            </div>
                            <label class="vditor-pdf-export-toggle" aria-checked="true">
                                <input type="checkbox" data-export-option="useTheme" checked>
                                <span class="vditor-pdf-export-toggle__track" aria-hidden="true">
                                    <span class="vditor-pdf-export-toggle__thumb"></span>
                                </span>
                            </label>
                        </div>
                        <div class="vditor-pdf-export-row vditor-pdf-export-row--select" data-export-section="pdf-page-size">
                            <div class="vditor-pdf-export-row__text">
                                <span class="vditor-pdf-export-row__label">Page Size</span>
                            </div>
                            <div class="vditor-pdf-export-select-wrap">
                                <select class="vditor-pdf-export-select" data-export-option="pageFormat" aria-label="Page size">
                                    <option value="A4">A4</option>
                                    <option value="Letter">Letter</option>
                                    <option value="Legal">Legal</option>
                                    <option value="A3">A3</option>
                                    <option value="A5">A5</option>
                                    <option value="Tabloid">Tabloid</option>
                                </select>
                                <span class="codicon codicon-chevron-down vditor-pdf-export-select__chevron" aria-hidden="true"></span>
                            </div>
                        </div>
                        <div class="vditor-pdf-export-row vditor-pdf-export-row--select">
                            <div class="vditor-pdf-export-row__text">
                                <span class="vditor-pdf-export-row__label">Font</span>
                            </div>
                            <div class="vditor-pdf-export-select-wrap">
                                <select class="vditor-pdf-export-select" data-export-option="fontFamily" aria-label="Font family"></select>
                                <span class="codicon codicon-chevron-down vditor-pdf-export-select__chevron" aria-hidden="true"></span>
                            </div>
                        </div>
                        <div class="vditor-pdf-export-row vditor-pdf-export-row--select">
                            <div class="vditor-pdf-export-row__text">
                                <span class="vditor-pdf-export-row__label">Font Size</span>
                            </div>
                            <div class="vditor-pdf-export-select-wrap">
                                <select class="vditor-pdf-export-select" data-export-option="fontSize" aria-label="Font size"></select>
                                <span class="codicon codicon-chevron-down vditor-pdf-export-select__chevron" aria-hidden="true"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="vditor-pdf-export-dialog__footer">
                <button class="vditor-pdf-export-btn vditor-pdf-export-btn--cancel" type="button" data-export-action="cancel">Cancel</button>
                <button class="vditor-pdf-export-btn vditor-pdf-export-btn--primary" type="button" data-export-action="export">Export</button>
            </div>
        </div>
    </div>

</body>
<script src="dist/index.min.js"></script>
<script src="../lib/vscode.js"></script>
<script src="index.js" type="module"></script>

</html>
