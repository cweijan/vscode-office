<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="vditor.css" />
    <link rel="stylesheet" href="index.css" />
    <base href="{{baseUrl}}/">
    <meta id="configs" data-config='{{configs}}'>
    <link rel="stylesheet" href="../lib/context_material.min.css">
</head>

<body>
    <div id="vditor"></div>
    <div class="vscode-office-search" id="vscode-office-search" style="display: none;">
        <input id="vscode-office-search-input" type="text" placeholder="Find in Markdown" autocomplete="off" />
        <span class="vscode-office-search__count" id="vscode-office-search-count">0/0</span>
        <button id="vscode-office-search-prev" type="button" aria-label="Previous match">↑</button>
        <button id="vscode-office-search-next" type="button" aria-label="Next match">↓</button>
        <button id="vscode-office-search-close" type="button" aria-label="Close search">×</button>
    </div>
    <div class="dropdown-menu dropdown-menu-sm" id="context-menu" style="display: none;">
        <a class="dropdown-item" id="copy" href="#">Copy</a>
        <a class="dropdown-item" id="paste" href="#">Paste</a>
        <a class="dropdown-item" id="exportPdf" href="#">Export PDF</a>
        <a class="dropdown-item" id="exportPdfWithoutOutline" href="#">Export PDF (Without Outline)</a>
        <a class="dropdown-item" id="exportDocx" href="#">Export Docx</a>
        <a class="dropdown-item" id="exportHtml" href="#">Export HTML</a>
    </div>
</body>
<script src="vditor.js"></script>
<script src="mark.min.js"></script>
<script src="../lib/vscode.js"></script>
<script src="index.js" type="module"></script>

</html>
